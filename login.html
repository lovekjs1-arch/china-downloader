<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07080d" />
  <link rel="stylesheet" href="/style.css" />
  <title>ClipVault</title>
</head>
<body>
  <main class="login">
    <form class="login-box" method="post">
      <p class="kicker">PRIVATE ACCESS</p>
      <h1>ClipVault</h1>
      <input name="password" type="password" placeholder="비밀번호" autocomplete="current-password" autofocus />
      <button class="main" type="submit">입장</button>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </form>
  </main>
</body>
</html>
