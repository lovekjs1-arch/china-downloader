services:
  - type: web
    name: china-mobile-downloader
    env: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: MAX_LINKS_PER_JOB
        value: 5
      - key: MAX_AGE_SECONDS
        value: 7200
