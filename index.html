<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07080d" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" />
  <link rel="stylesheet" href="/style.css" />
  <title>ClipVault</title>
</head>
<body>
  <main class="app">
    <header class="top">
      <div>
        <p class="kicker">DOUYIN · XIAOHONGSHU</p>
        <h1>ClipVault</h1>
      </div>
      <button id="clearBtn" class="mini" type="button">초기화</button>
    </header>

    <section class="panel">
      <label for="linkText">링크</label>
      <textarea id="linkText" placeholder="공유 링크 또는 공유 문구를 붙여넣으세요." autocomplete="off" spellcheck="false"></textarea>
      <button id="pasteBtn" class="soft" type="button">붙여넣기</button>
    </section>

    <section class="switch">
      <button class="mode active" data-mode="video" type="button">영상</button>
      <button class="mode" data-mode="audio" type="button">음성</button>
    </section>

    <section id="statusCard" class="progress hidden">
      <div><span id="statusText">대기</span><span id="percentText">0%</span></div>
      <i><b id="barFill"></b></i>
    </section>

    <section id="resultCard" class="results"></section>
  </main>

  <footer class="dock">
    <button id="startBtn" class="main" type="button">다운로드</button>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
